name: Release (macOS)

# Builds the thin Selene installer (.dmg, app shell + boot scripts only) and the
# audio-runtime tarball (stripped GHC + Tidal store + SuperCollider + quarks +
# sc3-plugins) that the app downloads on first run. On a version tag (v*) both
# are published to a draft GitHub Release; on manual dispatch the .dmg is
# uploaded as a workflow artifact instead (dispatch builds carry no runtime tag,
# so they can only run against a repo checkout's vendor tree).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Apple Silicon only for now — produces an arm64 build that runs on
    # arm-based Macs. Intel (macos-13/x86_64) is a later matrix leg.
    runs-on: macos-14
    # The default GITHUB_TOKEN is read-only; tauri-action needs write to create
    # the release and upload the .dmg.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # ghcup + cabal, used by bundle/fetch-ghc.sh (it installs GHC 9.6.7 into
      # vendor/ghc via `ghcup ... --isolate` and tidal into the vendored cabal
      # store). haskell-actions/setup puts ghc/cabal on PATH but NOT a `ghcup`
      # binary the script can find, so bootstrap ghcup directly here. MINIMAL =
      # ghcup only; we add cabal (fetch-ghc installs the GHC itself).
      - name: Install ghcup + cabal
        run: |
          export BOOTSTRAP_HASKELL_NONINTERACTIVE=1
          export BOOTSTRAP_HASKELL_MINIMAL=1
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
          echo "$HOME/.ghcup/bin" >> "$GITHUB_PATH"
          "$HOME/.ghcup/bin/ghcup" install cabal --set

      # The vendored tree (SuperCollider, GHC, quarks, sc3-plugins) is fetched by
      # the beforeBuildCommand and is large + slow. Cache it keyed on the fetch
      # scripts; the scripts skip any step whose output is already present.
      - name: Cache vendored deps
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.cabal
          key: selene-vendor-${{ runner.os }}-${{ hashFiles('bundle/**') }}
          restore-keys: |
            selene-vendor-${{ runner.os }}-

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build + package + (on tag) publish
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary: the release tag whose runtime tarball this
          # build downloads on first run. Empty on non-tag builds.
          SELENE_RUNTIME_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        with:
          args: --bundles dmg
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Selene ${{ github.ref_name }}
          releaseDraft: true
          prerelease: true

      # The runtime the thin app fetches on first run. Assembled from the same
      # vendor tree the beforeBuildCommand just fetched/stripped, so the .dmg and
      # its runtime always come from one build. Uploaded to the same (draft)
      # release via the uploads API — `gh release upload` can't target drafts.
      - name: Package + upload runtime tarball
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf selene-runtime-aarch64.tar.gz \
            vendor/ghc vendor/cabal-store vendor/tidal-ghc-env \
            vendor/supercollider vendor/sc3-plugins vendor/quarks
          ls -lh selene-runtime-aarch64.tar.gz
          curl -f -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary @selene-runtime-aarch64.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.tauri.outputs.releaseId }}/assets?name=selene-runtime-aarch64.tar.gz"

      # On manual runs (no tag / no release) keep the .dmg as a downloadable
      # workflow artifact.
      - name: Upload .dmg artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: selene-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
