<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selene</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <div class="brand">
          <img class="brand-mark" src="/logo.png" alt="Selene logo" />
          Selene
        </div>
        <div id="file-status" class="file-status" title="Current file"></div>
        <div id="arrange-status" class="arrange-status" title="Length of the arrangement under the cursor" hidden></div>
        <nav class="transport">
          <button id="play" class="btn" title="Play / stop the line under the cursor" disabled>
            <span class="btn-label">▶ Play</span>
            <span class="btn-kbd" data-kbd="play"></span>
          </button>
          <button id="hush" class="btn" title="Stop everything">
            <span class="btn-label">■ Hush</span>
            <span class="btn-kbd" data-kbd="hush"></span>
          </button>
          <span class="sep"></span>
          <button id="mute" class="btn toggle" title="Mute the track under the cursor" disabled>
            <span class="btn-label">Mute</span>
            <span class="btn-kbd" data-kbd="mute"></span>
          </button>
          <button id="solo" class="btn toggle" title="Solo the track under the cursor" disabled>
            <span class="btn-label">Solo</span>
            <span class="btn-kbd" data-kbd="solo"></span>
          </button>
          <span class="sep"></span>
          <button id="sounds" class="btn toggle" title="Browse loaded sample banks">
            <span class="btn-label">Sounds</span>
          </button>
        </nav>
      </header>
      <div id="settings-modal" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-title">Settings</div>
          <label class="setting-row" for="latency">
            <span class="setting-label">Visual offset (ms)</span>
            <input id="latency" type="number" min="0" max="2000" step="10" />
          </label>
          <div class="setting-hint">Nudges the piano-roll playhead to line visuals up with the sound. Higher = visuals later.</div>
          <div class="modal-buttons">
            <button id="settings-close" class="btn primary">Done</button>
          </div>
        </div>
      </div>
      <div id="quit-modal" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-text">You have unsaved changes. Save before quitting?</div>
          <div class="modal-buttons">
            <button id="quit-cancel" class="btn">Cancel</button>
            <button id="quit-discard" class="btn">Don't Save</button>
            <button id="quit-save" class="btn primary">Save</button>
          </div>
        </div>
      </div>
      <div id="crash-banner" class="banner" hidden>
        <span class="banner-text"></span>
        <button id="banner-close" class="banner-close" title="Dismiss">×</button>
      </div>
      <aside id="sound-browser" class="sound-browser" hidden>
        <div class="sb-header">
          <input id="sb-search" class="sb-search" type="search" placeholder="Search sounds…" />
          <button id="sb-close" class="banner-close" title="Close">×</button>
        </div>
        <div class="sb-hint">Click to preview · double-click to insert at cursor</div>
        <div id="sb-list" class="sb-list"></div>
      </aside>
      <main id="editor"></main>
      <div id="viz-panel" class="viz-panel" hidden></div>
      <pre id="error-console" class="error-console" title="Last Tidal error" hidden></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
